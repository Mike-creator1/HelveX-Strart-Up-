<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HelveX</title>
<style>
  :root{
    /* ── Adjustable tokens ─────────────────────────────────── */
    --hx-cols: 51;
    --hx-rows: 11;
    --hx-gap: 10;            /* dot cell size (viewBox units)        */
    --hx-dot-ratio: 0.40;    /* dot radius / gap  (distinct, even)   */
    --hx-fade: 0.5s;         /* per-dot fade-in                      */
    --hx-sweep: 0.7s;        /* left-to-right reveal window          */
    --hx-stagger-y: 0.06;    /* faint vertical lean                  */
    --hx-logo-w: clamp(240px, 78vw, 940px);
    --hx-bg: #ffffff;
    --hx-dot: #000000;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  .hx-hero{
    min-height:100svh;
    display:flex; align-items:center; justify-content:center;
    background:var(--hx-bg); padding:24px;
  }
  .hx-vh{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;}
  .hx-logo{ width:var(--hx-logo-w); max-width:100%; margin-inline:auto; line-height:0; }
  .hx-logo svg{ display:block; width:100%; height:auto; overflow:visible; }
  .hx-logo circle{
    fill:var(--hx-dot);
    opacity:0;
    transform-box:fill-box; transform-origin:center;
    animation: hx-dot-in var(--hx-fade) cubic-bezier(.2,.7,.2,1) both;
    animation-delay: var(--d, 0s);
  }
  @keyframes hx-dot-in{ from{opacity:0;transform:scale(.6);} to{opacity:1;transform:scale(1);} }
  @media (prefers-reduced-motion: reduce){ .hx-logo circle{animation:none;opacity:1;transform:none;} }
</style>
</head>
<body>
  <section class="hx-hero">
    <h1 class="hx-vh">HelveX</h1>
    <div class="hx-logo" id="hx-logo" aria-hidden="true"></div>
  </section>
  <script>
  (function(){
    var ROWS = ["110001100000000000110000000000000000000011000000011","110001100000000000110000000000000000000001100000110","110001100000000000110000000000000000000000110001100","110001100011111000110011000110001111100000011011000","110001100110001100110011000110011000110000001110000","111111100110001100110001101100011000110000000100000","110001100111111100110001101100011111110000001110000","110001100110000000110000111000011000000000011011000","110001100110000000110000111000011000000000110001100","110001100110001100110000010000011000110001100000110","110001100011111000110000010000001111100011000000011"];
    var css   = getComputedStyle(document.documentElement);
    var cols  = 51, rows = 11;
    var gap   = parseFloat(css.getPropertyValue('--hx-gap'))||10;
    var ratio = parseFloat(css.getPropertyValue('--hx-dot-ratio'))||0.4;
    var sweep = parseFloat(css.getPropertyValue('--hx-sweep'))||0.7;
    var leanY = parseFloat(css.getPropertyValue('--hx-stagger-y'))||0.06;
    var r = gap*ratio, ns='http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns,'svg');
    svg.setAttribute('viewBox','0 0 '+(cols*gap)+' '+(rows*gap));
    svg.setAttribute('role','img'); svg.setAttribute('aria-label','HelveX');
    var frag = document.createDocumentFragment();
    for(var y=0;y<rows;y++){ var line=ROWS[y];
      for(var x=0;x<cols;x++){ if(line.charCodeAt(x)!==49) continue;
        var c=document.createElementNS(ns,'circle');
        c.setAttribute('cx',(x*gap+gap/2).toFixed(2));
        c.setAttribute('cy',(y*gap+gap/2).toFixed(2));
        c.setAttribute('r', r.toFixed(2));
        c.style.setProperty('--d', ((x/cols)*sweep + (y/rows)*leanY).toFixed(3)+'s');
        frag.appendChild(c);
      }
    }
    svg.appendChild(frag);
    document.getElementById('hx-logo').appendChild(svg);
  })();
  </script>
</body>
</html>
