<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HelveX</title>
<style>
  :root{
    /* ── Adjustable design tokens ───────────────────────────── */
    --hx-cols: 138;          /* grid columns (from the wordmark)   */
    --hx-rows: 32;          /* grid rows                          */
    --hx-gap: 12;                /* dot cell size in viewBox units     */
    --hx-dot-ratio: 0.40;        /* dot radius as fraction of the gap  */
    --hx-fade: 0.55s;            /* per-dot fade-in duration           */
    --hx-sweep: 0.75s;           /* total left-to-right reveal window  */
    /* Responsive width: small on phones, cinematic on desktop, never
       overflowing. Aspect ratio is locked by the SVG viewBox so the
       dots can never stretch or distort. */
    --hx-logo-w: clamp(260px, 82vw, 1080px);
    --hx-bg: #ffffff;
    --hx-dot: #000000;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  .hx-hero{
    min-height:100svh;
    display:flex; align-items:center; justify-content:center;
    background:var(--hx-bg);
    padding:24px;
  }
  .hx-visually-hidden{
    position:absolute; width:1px; height:1px; margin:-1px; padding:0;
    overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;
  }
  .hx-logo{
    width:var(--hx-logo-w);
    max-width:100%;
    margin-inline:auto;
    line-height:0;
  }
  .hx-logo svg{
    display:block;
    width:100%;
    height:auto;          /* keeps perfect proportions, never distorts */
    overflow:visible;
  }
  .hx-logo circle{
    fill:var(--hx-dot);
    opacity:0;
    transform-box:fill-box;
    transform-origin:center;
    animation: hx-dot-in var(--hx-fade) cubic-bezier(.2,.7,.2,1) both;
    animation-delay: var(--d, 0s);
  }
  @keyframes hx-dot-in{
    from{ opacity:0; transform:scale(.45); }
    to  { opacity:1; transform:scale(1); }
  }
  @media (prefers-reduced-motion: reduce){
    .hx-logo circle{ animation:none; opacity:1; transform:none; }
  }
</style>
</head>
<body>
  <section class="hx-hero">
    <h1 class="hx-visually-hidden">HelveX</h1>
    <div class="hx-logo" aria-hidden="true" id="hx-logo"></div>
  </section>

  <script>
  (function(){
    var ROWS = ["111111100000000000011111100000000000000000000000000000011111100000000000000000000000000000000000000000000000000001111111000000000011111110","111111100000000000011111100000000000000000000000000000011111100000000000000000000000000000000000000000000000000001111111100000000011111110","111111100000000000011111100000000000000000000000000000011111100000000000000000000000000000000000000000000000000000111111100000000111111100","111111100000000000011111100000000000000000000000000000011111100000000000000000000000000000000000000000000000000000111111110000000111111100","111111100000000000011111100000000000000000000000000000011111100000000000000000000000000000000000000000000000000000011111110000001111111000","111111100000000000011111100000000000000000000000000000011111100000000000000000000000000000000000000000000000000000001111111000001111111000","111111100000000000011111100000000000000000000000000000011111100000000000000000000000000000000000000000000000000000001111111000011111110000","111111100000000000011111100000000000001111100000000000011111100000000000000000000000000000000000111100000000000000000111111100111111100000","111111100000000000011111100000000001111111111100000000011111100011111100000000001111100000000111111111100000000000000111111111111111100000","111111100000000000011111100000000011111111111110000000011111100011111110000000011111100000011111111111111000000000000011111111111111000000","111111110000000000111111100000000111111111111111000000011111100001111110000000011111100000111111111111111100000000000001111111111110000000","111111111111111111111111100000001111111111111111100000011111100001111110000000011111100000111111111111111110000000000001111111111110000000","111111111111111111111111100000011111110000011111110000011111100001111111000000111111000001111111000011111110000000000000111111111100000000","111111111111111111111111100000011111100000001111110000011111100000111111000000111111000001111110000001111111000000000000111111111000000000","111111111111111111111111100000011111000000001111111000011111100000111111000000111111000011111100000000111111000000000000011111111000000000","111111111111111111111111100000111111000000000111111000011111100000111111000000111110000011111100000000111111000000000000011111111000000000","111111111111111111111111100000111111100000001111111000011111100000011111100001111110000011111110000000111111100000000000011111111100000000","111111110000000000111111100000111111111111111111111000011111100000011111100001111110000011111111111111111111100000000000111111111100000000","111111100000000000011111100000111111111111111111111000011111100000001111100001111100000111111111111111111111100000000001111111111110000000","111111100000000000011111100000111111111111111111111000011111100000001111110001111100000111111111111111111111100000000001111111111111000000","111111100000000000011111100000111111111111111111111000011111100000001111110011111100000111111111111111111111100000000011111111111111000000","111111100000000000011111100000111111100000000000000000011111100000000111110011111000000111111110000000000000000000000111111111111111100000","111111100000000000011111100000111111000000000000000000011111100000000111111111111000000011111100000000000000000000000111111100111111100000","111111100000000000011111100000111111000000000000000000011111100000000111111111111000000011111100000000000000000000001111111000011111110000","111111100000000000011111100000111111000000000111111000011111100000000011111111110000000011111100000000011111000000001111111000001111111000","111111100000000000011111100000011111100000001111111000011111100000000011111111110000000011111100000000111111000000011111110000001111111000","111111100000000000011111100000011111110000011111110000011111100000000011111111110000000001111110000001111111000000111111100000000111111100","111111100000000000011111100000001111111111111111110000011111100000000001111111100000000001111111111111111110000000111111100000000111111110","111111100000000000011111100000001111111111111111100000011111100000000001111111100000000000111111111111111100000001111111000000000011111110","111111100000000000011111100000000111111111111111000000011111100000000001111111100000000000011111111111111000000011111111000000000011111111","111111100000000000011111100000000001111111111100000000011111100000000000111111000000000000000111111111110000000011111110000000000001111111","000000000000000000000000000000000000011111100000000000000000000000000000000000000000000000000001111110000000000000000000000000000000000000"];
    var cols = 138, rows = 32;
    var css  = getComputedStyle(document.documentElement);
    var gap  = parseFloat(css.getPropertyValue('--hx-gap')) || 12;
    var ratio= parseFloat(css.getPropertyValue('--hx-dot-ratio')) || 0.4;
    var sweep= parseFloat(css.getPropertyValue('--hx-sweep')) || 0.75;
    var r    = gap * ratio;
    var W = cols*gap, H = rows*gap;
    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns,'svg');
    svg.setAttribute('viewBox','0 0 '+W+' '+H);
    svg.setAttribute('role','img');
    svg.setAttribute('aria-label','HelveX');
    var frag = document.createDocumentFragment();
    for(var y=0; y<rows; y++){
      var line = ROWS[y];
      for(var x=0; x<cols; x++){
        if(line.charCodeAt(x) !== 49) continue; // '1'
        var c = document.createElementNS(ns,'circle');
        c.setAttribute('cx', (x*gap + gap/2).toFixed(2));
        c.setAttribute('cy', (y*gap + gap/2).toFixed(2));
        c.setAttribute('r',  r.toFixed(2));
        /* Controlled stagger: a smooth left-to-right sweep with a faint
           vertical lean and tiny jitter — alive but never chaotic. */
        var d = (x/cols)*sweep + (y/rows)*0.10 + Math.random()*0.05;
        c.style.setProperty('--d', d.toFixed(3)+'s');
        frag.appendChild(c);
      }
    }
    svg.appendChild(frag);
    document.getElementById('hx-logo').appendChild(svg);
  })();
  </script>
</body>
</html>
