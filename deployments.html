<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Deployments — HelveX</title>
  <meta name="description" content="HelveX Deployments — environments, build history, health, logs, redeploy and rollback." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .env-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; margin-bottom:8px; }
    .env-card { background:var(--hx-surface); border:1px solid var(--hx-line); border-radius:var(--hx-r); padding:18px; }
    .env-card .top { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .env-card .top .nm { font-size:14.5px; font-weight:600; }
    .env-card .top .nm small { display:block; font-family:var(--hx-mono); font-size:11px; color:var(--hx-text-dim); font-weight:400; margin-top:2px; }
    .env-health { display:flex; align-items:center; justify-content:space-between; font-size:11.5px; color:var(--hx-text-mid); margin:12px 0 6px; }
    .timeline { position:relative; padding-left:26px; }
    .timeline::before { content:""; position:absolute; left:8px; top:6px; bottom:6px; width:2px; background:var(--hx-line); }
    .tl-item { position:relative; padding:0 0 22px; }
    .tl-item:last-child { padding-bottom:0; }
    .tl-dot { position:absolute; left:-22px; top:3px; width:14px; height:14px; border-radius:50%; border:3px solid var(--hx-surface); }
    .tl-dot.live { background:var(--hx-emerald); } .tl-dot.building { background:var(--hx-yellow-deep); } .tl-dot.failed { background:var(--hx-red); } .tl-dot.paused,.tl-dot.idle { background:var(--hx-text-faint); }
    .log { background:#0b0b0d; border-radius:10px; padding:14px 16px; font-family:var(--hx-mono); font-size:12px; line-height:1.75; color:#d4d4d8; max-height:340px; overflow:auto; white-space:pre-wrap; }
    .log .t { color:#6b7280; } .log .ok { color:#4ade80; } .log .warn { color:#fbbf24; } .log .err { color:#f87171; } .log .dim { color:#9ca3af; }
  </style>
</head>
<body data-active="deployments">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Deployments · infrastructure</p>
          <div class="hx-pg-hero-grid">
            <div>
              <h1 class="hx-pg-title">Deployments</h1>
              <p class="hx-pg-sub">Every build across your environments — with live health, version history, logs and one-click redeploy or rollback. Know instantly what’s live, building, failed or paused.</p>
              <div class="hx-pg-cta-row">
                <button class="hx-cta-primary" id="dp-new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>New deployment</button>
                <a href="/projects.html" class="hx-cta-secondary">View projects</a>
              </div>
            </div>
          </div>
        </header>

        <div class="wb-metrics" id="dp-metrics"></div>

        <h2 style="font-size:13px;font-weight:600;margin:22px 0 12px;color:var(--hx-text-mid)">Environments</h2>
        <div class="env-grid" id="dp-envs"></div>

        <div class="wb-toolbar">
          <div class="wb-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="dp-q" placeholder="Search by project, version or commit…" />
          </div>
          <div class="wb-seg" id="dp-tabs"></div>
        </div>

        <h2 style="font-size:13px;font-weight:600;margin:4px 0 14px;color:var(--hx-text-mid)">Build history</h2>
        <div id="dp-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    function sha(){return Math.random().toString(16).slice(2,9);}
    function ver(maj,min,pat){return 'v'+maj+'.'+min+'.'+pat;}
    function seed(){
      return [
        { id:WB.uid(), project:'Acme GTM', env:'production', status:'live', version:ver(2,4,1), commit:sha(), branch:'main', uptime:99.98, build:18, author:'AM', createdAt:WB.ago(12), msg:'Q3 launch — pricing update' },
        { id:WB.uid(), project:'Billing Revamp', env:'preview', status:'building', version:ver(1,9,0), commit:sha(), branch:'feat/stripe', uptime:0, build:0, author:'MK', createdAt:WB.ago(1), msg:'Migrate invoices to new schema' },
        { id:WB.uid(), project:'Customer Insights', env:'production', status:'live', version:ver(3,1,0), commit:sha(), branch:'main', uptime:99.91, build:24, author:'SL', createdAt:WB.ago(60*6), msg:'Add cohort retention chart' },
        { id:WB.uid(), project:'Acme GTM', env:'preview', status:'failed', version:ver(2,4,0), commit:sha(), branch:'feat/hero', uptime:0, build:31, author:'AM', createdAt:WB.ago(60*9), msg:'Redesign hero section' },
        { id:WB.uid(), project:'Support Copilot', env:'staging', status:'paused', version:ver(0,8,2), commit:sha(), branch:'main', uptime:0, build:12, author:'DV', createdAt:WB.ago(60*24*3), msg:'Agent guardrails update' },
        { id:WB.uid(), project:'Acme GTM', env:'production', status:'live', version:ver(2,3,5), commit:sha(), branch:'main', uptime:100, build:17, author:'AM', createdAt:WB.ago(60*24*2), msg:'Fix analytics tracking' }
      ];
    }
    var store=WB.store('deployments', seed);
    var ST={ q:'', tab:'all' };
    var $=function(id){return document.getElementById(id);};

    function metrics(){
      var all=store.all();
      var live=all.filter(function(d){return d.status==='live';});
      var avg=live.length?(live.reduce(function(s,d){return s+d.uptime;},0)/live.length).toFixed(2):'—';
      var failed=all.filter(function(d){return d.status==='failed' && (Date.now()-new Date(d.createdAt))<864e5;}).length;
      $('dp-metrics').innerHTML=
        m('Total builds',all.length,'all environments','<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>')+
        m('Live',live.length,'serving traffic','<circle cx="12" cy="12" r="3"/><path d="M5 12a7 7 0 0 1 14 0"/>')+
        m('Avg uptime',avg==='—'?'—':avg+'%','live services','<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>')+
        m('Failed · 24h',failed,failed?'needs attention':'all green','<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>');
    }
    function m(l,v,mm,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv">'+v+'</div><div class="mm">'+mm+'</div></div>';}

    function envs(){
      var defs=[['production','Production','main'],['preview','Preview','feature branches'],['staging','Staging','pre-release']];
      $('dp-envs').innerHTML=defs.map(function(e){
        var latest=store.all().filter(function(d){return d.env===e[0];}).sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);})[0];
        var st=latest?latest.status:'idle';
        var up=latest&&latest.status==='live'?latest.uptime:0;
        var bar=up>=99.9?'':up>=99?' warn':' err';
        return '<div class="env-card"><div class="top"><span class="wb-ic" style="width:34px;height:34px">'+WB.svg('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>')+'</span>'+
          '<div class="nm">'+e[1]+'<small>'+e[2]+'</small></div><span class="wb-pill '+(st==='live'?'live':st==='building'?'building pulse':st==='failed'?'failed':'idle')+'" style="margin-left:auto"><span class="d"></span>'+cap(st)+'</span></div>'+
          (latest?'<div class="wb-kv" style="padding:7px 0"><span class="k">Version</span><span class="v wb-mono">'+latest.version+'</span></div>'+
          '<div class="wb-kv" style="padding:7px 0"><span class="k">Commit</span><span class="v wb-mono">'+latest.commit+' · '+WB.esc(latest.branch)+'</span></div>'+
          '<div class="env-health"><span>Uptime</span><span class="wb-mono">'+(latest.status==='live'?up+'%':'—')+'</span></div><div class="wb-bar'+bar+'"><i style="width:'+(latest.status==='live'?up:0)+'%"></i></div>':'<p class="desc" style="margin:6px 0 0;color:var(--hx-text-mid);font-size:12.5px">No deployment in this environment yet.</p>')+
        '</div>';
      }).join('');
    }
    function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

    function tabs(){
      var all=store.all(); var c={all:all.length,live:0,building:0,failed:0,paused:0};
      all.forEach(function(d){ if(c[d.status]!==undefined)c[d.status]++; });
      $('dp-tabs').innerHTML=['all','live','building','failed','paused'].map(function(k){
        return '<button data-k="'+k+'" class="'+(ST.tab===k?'on':'')+'">'+cap(k)+' <span class="ct">'+c[k]+'</span></button>';
      }).join('');
      $('dp-tabs').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ST.tab=b.dataset.k;tabs();render();}; });
    }

    function visible(){
      var rows=store.all();
      if(ST.tab!=='all') rows=rows.filter(function(d){return d.status===ST.tab;});
      if(ST.q){var q=ST.q.toLowerCase();rows=rows.filter(function(d){return (d.project+' '+d.version+' '+d.commit+' '+d.branch+' '+d.msg).toLowerCase().indexOf(q)>=0;});}
      rows.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
      return rows;
    }

    function render(){
      var rows=visible(), host=$('dp-host');
      if(!rows.length){
        host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>')+'</div><h3>No deployments</h3><p>'+(store.all().length===0?'Ship your first build and it will appear here with full history and health.':'Nothing matches this filter.')+'</p>'+(store.all().length===0?'<button class="hx-cta-primary" id="dp-empty">New deployment</button>':'<button class="wb-btn" id="dp-clear">Clear filters</button>')+'</div>';
        var e=$('dp-empty'); if(e)e.onclick=newDeploy;
        var c=$('dp-clear'); if(c)c.onclick=function(){ST.q='';ST.tab='all';$('dp-q').value='';tabs();render();};
        return;
      }
      host.innerHTML='<div class="timeline">'+rows.map(item).join('')+'</div>';
      rows.forEach(function(d){
        bind('dp-logs-'+d.id,function(){openLogs(d);});
        bind('dp-redeploy-'+d.id,function(){redeploy(d);});
        bind('dp-rollback-'+d.id,function(){rollback(d);});
      });
    }
    function bind(id,fn){var el=$(id); if(el)el.onclick=fn;}

    function item(d){
      var canRollback=d.env==='production'&&d.status==='live';
      return '<div class="tl-item"><span class="tl-dot '+d.status+'"></span>'+
        '<div class="wb-card" style="cursor:default;padding:16px 18px">'+
          '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
            '<strong style="font-size:14px">'+WB.esc(d.project)+'</strong>'+
            '<span class="wb-tag">'+WB.esc(d.env)+'</span>'+
            '<span class="wb-pill '+(d.status==='live'?'live':d.status==='building'?'building pulse':d.status==='failed'?'failed':'paused')+'"><span class="d"></span>'+cap(d.status)+'</span>'+
            '<span style="margin-left:auto;font-size:11.5px;color:var(--hx-text-dim)">'+WB.relTime(d.createdAt)+'</span>'+
          '</div>'+
          '<p style="font-size:13px;color:var(--hx-text);margin:10px 0 4px">'+WB.esc(d.msg)+'</p>'+
          '<p class="wb-mono" style="font-size:11.5px;color:var(--hx-text-dim);margin:0 0 12px">'+d.version+' · '+d.commit+' · '+WB.esc(d.branch)+' · @'+WB.esc(d.author)+(d.status==='live'?' · '+d.uptime+'% uptime · '+d.build+'s build':'')+'</p>'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
            '<button class="wb-btn sm" id="dp-logs-'+d.id+'">'+WB.svg('<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>')+'View logs</button>'+
            (d.status==='live'?'<a class="wb-btn sm" href="https://'+slug(d.project)+'.helvex.app" target="_blank" rel="noopener">'+WB.svg('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>')+'Open live URL</a>':'')+
            (d.status!=='building'?'<button class="wb-btn sm" id="dp-redeploy-'+d.id+'">'+WB.svg('<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>')+'Redeploy</button>':'')+
            (canRollback?'<button class="wb-btn sm" id="dp-rollback-'+d.id+'">'+WB.svg('<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>')+'Rollback</button>':'')+
          '</div>'+
        '</div></div>';
    }
    function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}

    function buildLog(d){
      return '<span class="t">12:04:01</span> <span class="dim">Cloning '+slug(d.project)+' ('+WB.esc(d.branch)+')…</span>\n'+
        '<span class="t">12:04:03</span> <span class="dim">Installing dependencies…</span>\n'+
        '<span class="t">12:04:11</span> <span class="ok">✓</span> 412 packages in 8.2s\n'+
        '<span class="t">12:04:12</span> <span class="dim">Running build → next build</span>\n'+
        '<span class="t">12:04:24</span> <span class="ok">✓</span> Compiled successfully\n'+
        '<span class="t">12:04:25</span> <span class="dim">Collecting page data…</span>\n'+
        (d.status==='failed'
          ? '<span class="t">12:04:27</span> <span class="err">✗ Error: Type error in app/hero.tsx:42</span>\n<span class="t">12:04:27</span> <span class="err">  Property \'variant\' does not exist on type \'HeroProps\'.</span>\n<span class="t">12:04:27</span> <span class="err">Build failed with exit code 1</span>'
          : '<span class="t">12:04:31</span> <span class="ok">✓</span> Generated 18 static pages\n<span class="t">12:04:33</span> <span class="dim">Uploading build outputs…</span>\n<span class="t">12:04:38</span> <span class="ok">✓ Deployment '+(d.status==='building'?'in progress':'ready')+'</span> → '+d.version);
    }
    function openLogs(d){
      WB.drawer.open({ title:'Build logs · '+WB.esc(d.version), body:
        '<div class="wb-kv"><span class="k">Project</span><span class="v">'+WB.esc(d.project)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Environment</span><span class="v">'+WB.esc(d.env)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Commit</span><span class="v wb-mono">'+d.commit+'</span></div>'+
        '<div class="wb-kv"><span class="k">Status</span><span class="v"><span class="wb-pill '+(d.status==='live'?'live':d.status==='building'?'building pulse':d.status==='failed'?'failed':'paused')+'"><span class="d"></span>'+cap(d.status)+'</span></span></div>'+
        '<div style="margin:16px 0 6px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--hx-text-dim)">Output</div>'+
        '<div class="log">'+buildLog(d)+'</div>',
        foot:'<button class="wb-btn" id="lg-copy" style="flex:1">Copy logs</button><button class="wb-btn" id="lg-close">Close</button>',
        onMount:function(){ document.getElementById('lg-close').onclick=WB.drawer.close; document.getElementById('lg-copy').onclick=function(){try{navigator.clipboard.writeText(document.querySelector('.log').innerText);}catch(e){} WB.toast('Logs copied','ok');}; } });
    }

    function redeploy(d){
      var nd={ id:WB.uid(), project:d.project, env:d.env, status:'building', version:bump(d.version), commit:sha(), branch:d.branch, uptime:0, build:0, author:d.author, createdAt:new Date().toISOString(), msg:'Redeploy of '+d.version };
      store.add(nd); WB.toast('Build started for '+d.project,'info'); metrics();envs();tabs();render();
      setTimeout(function(){ store.update(nd.id,{status:'live',uptime:99.99,build:14+Math.floor(Math.random()*12)}); WB.toast(d.project+' is live · '+nd.version,'ok'); metrics();envs();tabs();render(); }, 2600);
    }
    function rollback(d){
      var prev=store.all().filter(function(x){return x.project===d.project&&x.env===d.env&&x.status==='live'&&x.id!==d.id;}).sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);})[0];
      if(!prev){ WB.toast('No previous version to roll back to','err'); return; }
      var nd={ id:WB.uid(), project:d.project, env:d.env, status:'live', version:prev.version, commit:prev.commit, branch:prev.branch, uptime:99.97, build:prev.build, author:d.author, createdAt:new Date().toISOString(), msg:'Rolled back to '+prev.version };
      store.add(nd); WB.toast('Rolled back to '+prev.version,'ok'); metrics();envs();tabs();render();
    }
    function bump(v){var p=v.replace('v','').split('.').map(Number);p[2]++;return 'v'+p.join('.');}

    function newDeploy(){
      var projects=['Acme GTM','Billing Revamp','Customer Insights','Support Copilot'];
      WB.drawer.open({ title:'New deployment', body:
        '<div class="wb-field"><label>Project</label><select id="nd-proj">'+projects.map(function(p){return '<option>'+p+'</option>';}).join('')+'</select></div>'+
        '<div class="wb-field"><label>Environment</label><select id="nd-env"><option value="production">Production</option><option value="preview">Preview</option><option value="staging">Staging</option></select></div>'+
        '<div class="wb-field"><label>Branch</label><input id="nd-branch" value="main"></div>'+
        '<div class="wb-field"><label>Message</label><input id="nd-msg" placeholder="What changed?"></div>',
        foot:'<button class="wb-btn primary" id="nd-go" style="flex:1">Deploy</button><button class="wb-btn" id="nd-cancel">Cancel</button>',
        onMount:function(){
          document.getElementById('nd-cancel').onclick=WB.drawer.close;
          document.getElementById('nd-go').onclick=function(){
            var nd={ id:WB.uid(), project:document.getElementById('nd-proj').value, env:document.getElementById('nd-env').value, status:'building', version:ver(1,0,0), commit:sha(), branch:document.getElementById('nd-branch').value||'main', uptime:0, build:0, author:'AM', createdAt:new Date().toISOString(), msg:document.getElementById('nd-msg').value.trim()||'Manual deployment' };
            store.add(nd); WB.drawer.close(); WB.toast('Build queued','info'); metrics();envs();tabs();render();
            setTimeout(function(){ var fail=Math.random()<0.15; store.update(nd.id, fail?{status:'failed'}:{status:'live',uptime:99.99,build:16}); WB.toast(fail?'Build failed — check logs':nd.project+' is live',fail?'err':'ok'); metrics();envs();tabs();render(); },2800);
          };
        } });
    }

    $('dp-new').onclick=newDeploy;
    var qt; $('dp-q').oninput=function(e){ST.q=e.target.value.trim();clearTimeout(qt);qt=setTimeout(render,140);};
    metrics(); envs(); tabs(); render();
  })();
  </script>
</body>
</html>
