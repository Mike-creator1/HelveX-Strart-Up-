<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Services — HelveX</title>
  <meta name="description" content="HelveX Services — connect, configure and monitor the integrations powering your AI workspace." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .svc-card { display:flex; flex-direction:column; }
    .svc-emoji { width:44px; height:44px; border-radius:12px; display:grid; place-items:center; font-size:22px; background:var(--hx-bg-2); border:1px solid var(--hx-line); flex-shrink:0; }
    .svc-usage { display:flex; align-items:center; justify-content:space-between; font-size:11.5px; color:var(--hx-text-mid); margin:2px 0 8px; }
    .perm-row { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--hx-line-soft); }
    .perm-row:last-child { border-bottom:0; }
    .perm-row .pt { font-size:13px; font-weight:500; } .perm-row .ps { font-size:11.5px; color:var(--hx-text-dim); }
    .dr-section { margin:18px 0 8px; font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--hx-text-dim); }
  </style>
</head>
<body data-active="services">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Services · integrations</p>
          <div class="hx-pg-hero-grid">
            <div>
              <h1 class="hx-pg-title">Services</h1>
              <p class="hx-pg-sub">The integrations that power your workspace — messaging, payments, code, data and AI providers. Connect a service, set its permissions and watch its usage from one place.</p>
              <div class="hx-pg-cta-row">
                <button class="hx-cta-primary" id="svc-browse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Browse services</button>
                <a href="/api-keys.html" class="hx-cta-secondary">API keys</a>
              </div>
            </div>
          </div>
        </header>

        <div class="wb-metrics" id="svc-metrics"></div>

        <div class="wb-toolbar">
          <div class="wb-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="svc-q" placeholder="Search services…" />
          </div>
          <div class="wb-seg" id="svc-cats"></div>
        </div>

        <div id="svc-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var CATS={ comms:'Communication', pay:'Payments', dev:'Developer', prod:'Productivity', ai:'AI & Data', analytics:'Analytics' };
    function seed(){
      return [
        { id:'slack', name:'Slack', cat:'comms', emoji:'💬', desc:'Send alerts and let agents post to channels.', connected:true, usage:1840, lastSync:WB.ago(8), perms:[['Read messages',true],['Post as bot',true],['Manage channels',false]] },
        { id:'github', name:'GitHub', cat:'dev', emoji:'🐙', desc:'Trigger deployments and read repositories.', connected:true, usage:642, lastSync:WB.ago(35), perms:[['Read repos',true],['Write commits',false],['Manage webhooks',true]] },
        { id:'stripe', name:'Stripe', cat:'pay', emoji:'💳', desc:'Billing, subscriptions and usage metering.', connected:true, usage:3120, lastSync:WB.ago(60*2), perms:[['Read charges',true],['Create invoices',true],['Issue refunds',false]] },
        { id:'supabase', name:'Supabase', cat:'ai', emoji:'⚡', desc:'Auth, Postgres and vector storage for agents.', connected:true, usage:9870, lastSync:WB.ago(3), perms:[['Read data',true],['Write data',true],['Run migrations',false]] },
        { id:'notion', name:'Notion', cat:'prod', emoji:'📓', desc:'Sync docs into the knowledge base.', connected:false, usage:0, lastSync:null, perms:[['Read pages',true],['Write pages',false]] },
        { id:'gdrive', name:'Google Drive', cat:'prod', emoji:'📁', desc:'Index files and folders for retrieval.', connected:false, usage:0, lastSync:null, perms:[['Read files',true],['Write files',false]] },
        { id:'linear', name:'Linear', cat:'dev', emoji:'📐', desc:'Create issues from chats and track work.', connected:false, usage:0, lastSync:null, perms:[['Read issues',true],['Create issues',true]] },
        { id:'posthog', name:'PostHog', cat:'analytics', emoji:'📊', desc:'Product analytics and funnels for agents.', connected:false, usage:0, lastSync:null, perms:[['Read events',true],['Capture events',false]] },
        { id:'resend', name:'Resend', cat:'comms', emoji:'✉️', desc:'Transactional and campaign email.', connected:true, usage:412, lastSync:WB.ago(60*5), perms:[['Send email',true],['Manage domains',false]] },
        { id:'openai', name:'OpenAI', cat:'ai', emoji:'🧠', desc:'Bring an external model provider.', connected:false, usage:0, lastSync:null, perms:[['Use models',true]] }
      ];
    }
    var store=WB.store('services', seed);
    var ST={ q:'', cat:'all' };
    var $=function(id){return document.getElementById(id);};

    function metrics(){
      var all=store.all(); var conn=all.filter(function(s){return s.connected;});
      var usage=conn.reduce(function(s,x){return s+x.usage;},0);
      $('svc-metrics').innerHTML=
        m('Connected',conn.length+' / '+all.length,'active integrations','<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>')+
        m('API calls · 30d',usage.toLocaleString(),'across services','<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>')+
        m('Categories',Object.keys(CATS).length,'available types','<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>')+
        m('Health',conn.length?'Operational':'—',conn.length?'all systems normal':'nothing connected','<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>');
    }
    function m(l,v,mm,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv" style="font-size:'+(String(v).length>6?'19px':'26px')+'">'+v+'</div><div class="mm">'+mm+'</div></div>';}

    function cats(){
      var all=store.all(); var counts={}; all.forEach(function(s){counts[s.cat]=(counts[s.cat]||0)+1;});
      var html='<button data-k="all" class="'+(ST.cat==='all'?'on':'')+'">All <span class="ct">'+all.length+'</span></button>';
      html+='<button data-k="connected" class="'+(ST.cat==='connected'?'on':'')+'">Connected <span class="ct">'+all.filter(function(s){return s.connected;}).length+'</span></button>';
      Object.keys(CATS).forEach(function(k){ if(counts[k]) html+='<button data-k="'+k+'" class="'+(ST.cat===k?'on':'')+'">'+CATS[k]+' <span class="ct">'+counts[k]+'</span></button>'; });
      $('svc-cats').innerHTML=html;
      $('svc-cats').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ST.cat=b.dataset.k;cats();render();}; });
    }

    function visible(){
      var rows=store.all();
      if(ST.cat==='connected') rows=rows.filter(function(s){return s.connected;});
      else if(ST.cat!=='all') rows=rows.filter(function(s){return s.cat===ST.cat;});
      if(ST.q){var q=ST.q.toLowerCase();rows=rows.filter(function(s){return (s.name+' '+s.desc+' '+CATS[s.cat]).toLowerCase().indexOf(q)>=0;});}
      rows.sort(function(a,b){ return (b.connected-a.connected)||a.name.localeCompare(b.name); });
      return rows;
    }

    function render(){
      var rows=visible(), host=$('svc-host');
      if(!rows.length){ host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>')+'</div><h3>No services found</h3><p>Try a different search or category.</p><button class="wb-btn" id="svc-clear">Clear filters</button></div>'; var c=$('svc-clear'); if(c)c.onclick=function(){ST.q='';ST.cat='all';$('svc-q').value='';cats();render();}; return; }
      host.innerHTML='<div class="wb-grid">'+rows.map(card).join('')+'</div>';
      rows.forEach(function(s){
        $('svc-open-'+s.id).onclick=function(){ openDetail(s); };
        var a=$('svc-act-'+s.id); if(a) a.onclick=function(e){ e.stopPropagation(); s.connected?disconnect(s):connect(s); };
      });
    }

    function card(s){
      return '<div class="wb-card svc-card" id="svc-open-'+s.id+'">'+
        '<div class="wb-card-head"><div class="svc-emoji">'+s.emoji+'</div>'+
          '<div style="flex:1;min-width:0"><h3>'+WB.esc(s.name)+'</h3><div class="sub">'+WB.esc(CATS[s.cat])+'</div></div>'+
          '<span class="wb-pill '+(s.connected?'connected':'disconnected')+'"><span class="d"></span>'+(s.connected?'Connected':'Not connected')+'</span></div>'+
        '<p class="desc" style="min-height:34px">'+WB.esc(s.desc)+'</p>'+
        (s.connected?'<div class="svc-usage"><span>'+s.usage.toLocaleString()+' calls · 30d</span><span>synced '+WB.relTime(s.lastSync)+'</span></div>':'')+
        '<div class="wb-card-foot" style="border-top:none;padding-top:4px"><button class="wb-btn '+(s.connected?'':'primary')+'" id="svc-act-'+s.id+'" style="flex:1">'+(s.connected?'Disconnect':'Connect')+'</button><button class="wb-btn" style="flex:1">Configure</button></div>'+
      '</div>';
    }

    function connect(s){
      WB.drawer.open({ title:'Connect '+WB.esc(s.name), body:
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px"><div class="svc-emoji">'+s.emoji+'</div><div><div style="font-weight:600">'+WB.esc(s.name)+'</div><div class="sub" style="font-size:11.5px;color:var(--hx-text-dim)">'+WB.esc(CATS[s.cat])+'</div></div></div>'+
        '<p class="desc" style="color:var(--hx-text-mid)">'+WB.esc(s.desc)+'</p>'+
        '<div class="dr-section">Setup</div>'+
        '<div class="wb-field"><label>API key / token</label><input id="svc-key" placeholder="Paste your '+WB.esc(s.name)+' key" type="password"></div>'+
        '<div class="dr-section">Permissions requested</div>'+
        s.perms.map(function(p,i){ return '<div class="perm-row"><div style="flex:1"><div class="pt">'+WB.esc(p[0])+'</div></div><button class="wb-switch '+(p[1]?'on':'')+'" data-i="'+i+'"></button></div>'; }).join(''),
        foot:'<button class="wb-btn primary" id="svc-connect" style="flex:1">Connect '+WB.esc(s.name)+'</button><button class="wb-btn" id="svc-cancel">Cancel</button>',
        onMount:function(){
          var perms=s.perms.map(function(p){return p.slice();});
          document.querySelectorAll('.perm-row .wb-switch').forEach(function(sw){ sw.onclick=function(){ var i=+sw.dataset.i; perms[i][1]=!perms[i][1]; sw.classList.toggle('on',perms[i][1]); }; });
          document.getElementById('svc-cancel').onclick=WB.drawer.close;
          document.getElementById('svc-connect').onclick=function(){
            var key=document.getElementById('svc-key').value.trim();
            if(!key){ WB.toast('An API key is required','err'); return; }
            var btn=document.getElementById('svc-connect'); btn.textContent='Connecting…'; btn.disabled=true;
            setTimeout(function(){ store.update(s.id,{connected:true,perms:perms,lastSync:new Date().toISOString(),usage:0}); WB.toast(s.name+' connected','ok'); WB.drawer.close(); metrics();cats();render(); },900);
          };
        } });
    }
    function disconnect(s){ openDetail(s); }

    function openDetail(s){
      var connected=s.connected;
      WB.drawer.open({ title:'<span style="display:inline-flex;align-items:center;gap:10px"><span class="svc-emoji" style="width:30px;height:30px;font-size:16px">'+s.emoji+'</span>'+WB.esc(s.name)+'</span>', body:
        '<div class="wb-kv"><span class="k">Status</span><span class="v"><span class="wb-pill '+(connected?'connected':'disconnected')+'"><span class="d"></span>'+(connected?'Connected':'Not connected')+'</span></span></div>'+
        '<div class="wb-kv"><span class="k">Category</span><span class="v">'+WB.esc(CATS[s.cat])+'</span></div>'+
        (connected?'<div class="wb-kv"><span class="k">API calls · 30d</span><span class="v wb-mono">'+s.usage.toLocaleString()+'</span></div>'+
        '<div class="wb-kv"><span class="k">Last sync</span><span class="v">'+WB.relTime(s.lastSync)+'</span></div>':'')+
        '<p class="desc" style="color:var(--hx-text-mid);margin-top:14px">'+WB.esc(s.desc)+'</p>'+
        '<div class="dr-section">Permissions</div>'+
        s.perms.map(function(p,i){ return '<div class="perm-row"><div style="flex:1"><div class="pt">'+WB.esc(p[0])+'</div></div><button class="wb-switch '+(p[1]?'on':'')+'" data-i="'+i+'" '+(connected?'':'disabled style="opacity:.4"')+'></button></div>'; }).join(''),
        foot: connected
          ? '<button class="wb-btn" id="svc-resync" style="flex:1">Re-sync now</button><button class="wb-btn danger" id="svc-disc">Disconnect</button>'
          : '<button class="wb-btn primary" id="svc-conn2" style="flex:1">Connect</button><button class="wb-btn" id="svc-close2">Close</button>',
        onMount:function(){
          if(connected){
            document.querySelectorAll('.perm-row .wb-switch').forEach(function(sw){ sw.onclick=function(){ var i=+sw.dataset.i; var perms=store.all().find(function(x){return x.id===s.id;}).perms; perms[i][1]=!perms[i][1]; store.update(s.id,{perms:perms}); sw.classList.toggle('on',perms[i][1]); WB.toast('Permission updated','ok'); }; });
            document.getElementById('svc-resync').onclick=function(){ store.update(s.id,{lastSync:new Date().toISOString()}); WB.toast(s.name+' re-synced','ok'); WB.drawer.close(); metrics();render(); };
            document.getElementById('svc-disc').onclick=function(e){ WB.arm(e.currentTarget,'Confirm disconnect',function(){ store.update(s.id,{connected:false,usage:0,lastSync:null}); WB.toast(s.name+' disconnected','info'); WB.drawer.close(); metrics();cats();render(); }); };
          } else {
            document.getElementById('svc-close2').onclick=WB.drawer.close;
            document.getElementById('svc-conn2').onclick=function(){ WB.drawer.close(); connect(s); };
          }
        } });
    }

    $('svc-browse').onclick=function(){ ST.cat='all';ST.q='';$('svc-q').value='';cats();render(); window.scrollTo({top:300,behavior:'smooth'}); };
    var qt; $('svc-q').oninput=function(e){ST.q=e.target.value.trim();clearTimeout(qt);qt=setTimeout(render,140);};
    metrics(); cats(); render();
  })();
  </script>
</body>
</html>
