<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Projects — HelveX</title>
  <meta name="description" content="HelveX Projects — manage AI workspaces with agents, files, tasks and deployments in one place." />
  <link rel="icon" type="image/png" href="/helvex-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/platform.css" />
  <link rel="stylesheet" href="/workbench.css" />
  <style>
    .pj-card { display:flex; flex-direction:column; }
    .pj-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:4px 0 14px; }
    .pj-stat { background:var(--hx-bg-2); border-radius:9px; padding:9px 10px; text-align:center; }
    .pj-stat .n { font-family:var(--hx-mono); font-size:16px; font-weight:600; color:var(--hx-text); }
    .pj-stat .l { font-size:10px; color:var(--hx-text-dim); margin-top:2px; text-transform:uppercase; letter-spacing:.03em; }
    .pj-progress { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--hx-text-mid); margin-bottom:12px; }
    .pj-progress .wb-bar { flex:1; }
    .pj-members { display:flex; }
    .pj-members span { width:24px; height:24px; border-radius:50%; background:var(--hx-bg-3); border:1.5px solid var(--hx-surface); display:grid; place-items:center; font-size:10px; font-weight:600; color:var(--hx-text-mid); margin-left:-6px; }
    .pj-members span:first-child { margin-left:0; }
    .task-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--hx-line-soft); font-size:13px; }
    .task-row:last-child { border-bottom:0; }
    .task-check { width:18px; height:18px; border-radius:5px; border:1.6px solid var(--hx-line-strong); flex-shrink:0; cursor:pointer; display:grid; place-items:center; }
    .task-check.done { background:var(--hx-emerald); border-color:var(--hx-emerald); }
    .task-check.done svg { width:12px; height:12px; color:#fff; }
    .task-row.done span { color:var(--hx-text-dim); text-decoration:line-through; }
    .dr-section { margin:18px 0 8px; font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--hx-text-dim); }
  </style>
</head>
<body data-active="projects">

  <div class="hx-app">
    <aside class="hx-sidebar"></aside>
    <div>
      <div class="hx-topbar"></div>
      <main class="hx-main">

        <div class="hx-aura" aria-hidden="true"></div>
        <header class="hx-pg-hero">
          <p class="hx-pg-eyebrow"><span class="hx-pg-eyebrow-dot" aria-hidden="true"></span>Workspace</p>
          <div class="hx-pg-hero-grid">
            <div>
              <h1 class="hx-pg-title">Projects</h1>
              <p class="hx-pg-sub">Each project is a workspace that ties together its chats, files, AI agents, tasks and deployments. Open one to manage everything in context.</p>
              <div class="hx-pg-cta-row">
                <button class="hx-cta-primary" id="pj-new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New project</button>
              </div>
            </div>
          </div>
        </header>

        <div class="wb-metrics" id="pj-metrics"></div>

        <div class="wb-toolbar">
          <div class="wb-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="pj-q" placeholder="Search projects…" />
          </div>
          <div class="wb-seg" id="pj-tabs"></div>
          <select class="wb-select" id="pj-sort">
            <option value="activity">Sort: Last activity</option>
            <option value="name">Sort: Name (A–Z)</option>
            <option value="created">Sort: Newest</option>
            <option value="tasks">Sort: Open tasks</option>
          </select>
        </div>

        <div id="pj-host"></div>

      </main>
    </div>
  </div>

  <script src="/platform.js"></script>
  <script src="/workbench.js"></script>
  <script>
  (function(){
    var COLORS=['#6C5DD3','#0EA5E9','#10B981','#C9A227','#EC4899','#F97316'];
    function seed(){
      return [
        { id:WB.uid(), name:'Acme GTM', slug:'acme-gtm', desc:'Go-to-market for the Q3 launch — landing pages, campaigns and analytics.', status:'active', agents:3, files:23, tasks:{done:8,total:11}, members:['AM','MK','SL'], lastActivity:WB.ago(12), createdAt:WB.ago(60*24*22), deploy:'live' },
        { id:WB.uid(), name:'Billing Revamp', slug:'billing-revamp', desc:'Stripe migration, invoices, dunning and usage-based metering.', status:'active', agents:1, files:14, tasks:{done:5,total:9}, members:['MK','AM'], lastActivity:WB.ago(60*3), createdAt:WB.ago(60*24*15), deploy:'building' },
        { id:WB.uid(), name:'Customer Insights', slug:'customer-insights', desc:'Churn analysis, NPS and cohort reporting dashboards.', status:'active', agents:2, files:48, tasks:{done:12,total:12}, members:['SL'], lastActivity:WB.ago(60*26), createdAt:WB.ago(60*24*30), deploy:'live' },
        { id:WB.uid(), name:'Support Copilot', slug:'support-copilot', desc:'AI agent that drafts replies grounded in the knowledge base.', status:'paused', agents:4, files:62, tasks:{done:6,total:14}, members:['AM','MK','SL','DV'], lastActivity:WB.ago(60*24*5), createdAt:WB.ago(60*24*44), deploy:'paused' },
        { id:WB.uid(), name:'2025 Archive', slug:'2025-archive', desc:'Last year’s campaign site, kept for reference.', status:'archived', agents:0, files:9, tasks:{done:3,total:3}, members:['AM'], lastActivity:WB.ago(60*24*120), createdAt:WB.ago(60*24*300), deploy:'idle' }
      ];
    }
    var store=WB.store('projects', seed);
    var TASKSTORE=WB.store('project_tasks', {});
    var ST={ q:'', tab:'all', sort:'activity' };
    var $=function(id){return document.getElementById(id);};

    function metrics(){
      var all=store.all();
      var active=all.filter(function(p){return p.status==='active';}).length;
      var open=all.reduce(function(s,p){return s+(p.tasks.total-p.tasks.done);},0);
      var agents=all.reduce(function(s,p){return s+p.agents;},0);
      $('pj-metrics').innerHTML=
        m('Projects',all.length,active+' active','<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>')+
        m('Open tasks',open,'across all projects','<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>')+
        m('Connected agents',agents,'working in projects','<circle cx="12" cy="8" r="4"/><path d="M5.5 21a7 7 0 0 1 13 0"/>')+
        m('Live deployments',all.filter(function(p){return p.deploy==='live';}).length,'serving traffic','<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>');
    }
    function m(l,v,mm,icon){return '<div class="wb-metric"><div class="ml">'+WB.svg(icon)+l+'</div><div class="mv">'+v+'</div><div class="mm">'+mm+'</div></div>';}

    function tabs(){
      var all=store.all(); var c={all:all.length,active:0,paused:0,archived:0};
      all.forEach(function(p){ if(c[p.status]!==undefined)c[p.status]++; });
      $('pj-tabs').innerHTML=['all','active','paused','archived'].map(function(k){
        return '<button data-k="'+k+'" class="'+(ST.tab===k?'on':'')+'">'+k.charAt(0).toUpperCase()+k.slice(1)+' <span class="ct">'+c[k]+'</span></button>';
      }).join('');
      $('pj-tabs').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ST.tab=b.dataset.k;tabs();render();}; });
    }

    function visible(){
      var rows=store.all();
      if(ST.tab!=='all') rows=rows.filter(function(p){return p.status===ST.tab;});
      if(ST.q){var q=ST.q.toLowerCase(); rows=rows.filter(function(p){return (p.name+' '+p.desc+' '+p.slug).toLowerCase().indexOf(q)>=0;});}
      rows.sort(function(a,b){
        if(ST.sort==='name') return a.name.localeCompare(b.name);
        if(ST.sort==='created') return new Date(b.createdAt)-new Date(a.createdAt);
        if(ST.sort==='tasks') return (b.tasks.total-b.tasks.done)-(a.tasks.total-a.tasks.done);
        return new Date(b.lastActivity)-new Date(a.lastActivity);
      });
      return rows;
    }

    function render(){
      var rows=visible(), host=$('pj-host');
      if(!rows.length){
        var empty=store.all().length===0;
        host.innerHTML='<div class="wb-empty"><div class="orb">'+WB.svg('<path d="M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>')+'</div>'+
          '<h3>'+(empty?'No projects yet':'No projects match')+'</h3><p>'+(empty?'Create a workspace to organise chats, files, agents, tasks and deployments together.':'Try another search or filter.')+'</p>'+
          (empty?'<button class="hx-cta-primary" id="pj-empty">Create your first project</button>':'<button class="wb-btn" id="pj-clear">Clear filters</button>')+'</div>';
        var e=$('pj-empty'); if(e)e.onclick=openNew;
        var c=$('pj-clear'); if(c)c.onclick=function(){ST.q='';ST.tab='all';$('pj-q').value='';tabs();render();};
        return;
      }
      host.innerHTML='<div class="wb-grid">'+rows.map(card).join('')+'</div>';
      rows.forEach(function(p){ $('pj-'+p.id).onclick=function(){openDetail(p);}; });
    }

    function card(p){
      var col=COLORS[Math.abs(hash(p.id))%COLORS.length];
      var pct=p.tasks.total?Math.round(p.tasks.done/p.tasks.total*100):0;
      return '<div class="wb-card pj-card" id="pj-'+p.id+'">'+
        '<div class="wb-card-head"><div class="wb-ic" style="background:'+col+'1a;border-color:'+col+'33;color:'+col+'">'+WB.esc(p.name.charAt(0))+'</div>'+
          '<div style="flex:1;min-width:0"><h3 style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+WB.esc(p.name)+'</h3><div class="sub">'+WB.esc(p.slug)+'</div></div>'+
          '<span class="wb-pill '+p.status+(p.deploy==='building'?' pulse':'')+'"><span class="d"></span>'+cap(p.status)+'</span></div>'+
        '<p class="desc" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+WB.esc(p.desc)+'</p>'+
        '<div class="pj-stats"><div class="pj-stat"><div class="n">'+p.agents+'</div><div class="l">Agents</div></div>'+
          '<div class="pj-stat"><div class="n">'+p.files+'</div><div class="l">Files</div></div>'+
          '<div class="pj-stat"><div class="n">'+p.tasks.total+'</div><div class="l">Tasks</div></div></div>'+
        '<div class="pj-progress"><div class="wb-bar'+(pct===100?'':' warn')+'"><i style="width:'+pct+'%"></i></div><span>'+pct+'%</span></div>'+
        '<div class="wb-card-foot"><div class="pj-members">'+p.members.slice(0,4).map(function(x){return '<span>'+WB.esc(x)+'</span>';}).join('')+'</div>'+
          '<span style="margin-left:auto;display:flex;align-items:center;gap:5px">'+WB.svg('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')+WB.relTime(p.lastActivity)+'</span></div>'+
      '</div>';
    }
    function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
    function hash(s){var h=0;for(var i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h;}

    function getTasks(p){
      var t=TASKSTORE.all(); if(t[p.id]) return t[p.id];
      var sample=['Define scope & success metrics','Draft initial copy with HeliX','Review with the team','Connect knowledge base','Ship first deployment'];
      var list=sample.map(function(s,i){return {id:WB.uid(),text:s,done:i<p.tasks.done};});
      t[p.id]=list; TASKSTORE.set(t); return list;
    }
    function saveTasks(p,list){ var t=TASKSTORE.all(); t[p.id]=list; TASKSTORE.set(t); var done=list.filter(function(x){return x.done;}).length; store.update(p.id,{tasks:{done:done,total:list.length}, lastActivity:new Date().toISOString()}); }

    function openDetail(p){
      var tasks=getTasks(p);
      var col=COLORS[Math.abs(hash(p.id))%COLORS.length];
      var body=
        '<div class="wb-kv"><span class="k">Status</span><span class="v"><span class="wb-pill '+p.status+'"><span class="d"></span>'+cap(p.status)+'</span></span></div>'+
        '<div class="wb-kv"><span class="k">Deployment</span><span class="v"><span class="wb-pill '+(p.deploy==='live'?'live':p.deploy==='building'?'building pulse':'idle')+'"><span class="d"></span>'+cap(p.deploy)+'</span></span></div>'+
        '<div class="wb-kv"><span class="k">Live URL</span><span class="v wb-mono">'+WB.esc(p.slug)+'.helvex.app</span></div>'+
        '<div class="wb-kv"><span class="k">Connected agents</span><span class="v">'+p.agents+'</span></div>'+
        '<div class="wb-kv"><span class="k">Files</span><span class="v">'+p.files+'</span></div>'+
        '<div class="wb-kv"><span class="k">Created</span><span class="v">'+WB.fmtDate(p.createdAt)+'</span></div>'+
        '<div class="wb-kv"><span class="k">Last activity</span><span class="v">'+WB.relTime(p.lastActivity)+'</span></div>'+
        '<div class="dr-section">Tasks</div><div id="dr-tasks">'+tasks.map(taskRow).join('')+'</div>'+
        '<div style="display:flex;gap:6px;margin-top:10px"><input id="dr-newtask" class="wb-field" style="margin:0;flex:1" placeholder="Add a task…"><button class="wb-btn" id="dr-addtask">Add</button></div>'+
        '<div class="dr-section">Quick actions</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
          '<a class="wb-btn" href="/chat.html">'+WB.svg('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>')+'Open chat</a>'+
          '<a class="wb-btn" href="/deployments.html">'+WB.svg('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>')+'Deploy</a>'+
          '<a class="wb-btn" href="/memory.html">'+WB.svg('<path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0-3 3v1a3 3 0 0 0-1 5.83V18a3 3 0 0 0 3 3h1.5a2.5 2.5 0 0 0 5 0H16a3 3 0 0 0 3-3v-2.17A3 3 0 0 0 18 10V9a3 3 0 0 0-3-3V5a3 3 0 0 0-3-3z"/>')+'Knowledge</a>'+
          '<a class="wb-btn" href="/services.html">'+WB.svg('<path d="M9 2v4M15 2v4M5 6h14l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2z"/>')+'Services</a>'+
        '</div>';
      var foot='<button class="wb-btn" id="dr-toggle" style="flex:1">'+(p.status==='active'?'Pause project':'Activate project')+'</button>'+
        '<button class="wb-btn danger" id="dr-archive">'+(p.status==='archived'?'Delete':'Archive')+'</button>';
      WB.drawer.open({ title:'<span style="display:inline-flex;align-items:center;gap:10px"><span class="wb-ic" style="width:30px;height:30px;font-size:14px;background:'+col+'1a;border-color:'+col+'33;color:'+col+'">'+WB.esc(p.name.charAt(0))+'</span>'+WB.esc(p.name)+'</span>', body:body, foot:foot, onMount:function(){ wireDetail(p); } });
    }
    function taskRow(t){ return '<div class="task-row '+(t.done?'done':'')+'" data-id="'+t.id+'"><span class="task-check '+(t.done?'done':'')+'">'+(t.done?WB.svg('<polyline points="20 6 9 17 4 12"/>',3):'')+'</span><span style="flex:1">'+WB.esc(t.text)+'</span></div>'; }
    function wireDetail(p){
      function rebindTasks(){
        document.querySelectorAll('#dr-tasks .task-row').forEach(function(row){
          row.querySelector('.task-check').onclick=function(){
            var list=getTasks(p).map(function(t){return t.id===row.dataset.id?Object.assign(t,{done:!t.done}):t;});
            saveTasks(p,list); document.getElementById('dr-tasks').innerHTML=list.map(taskRow).join(''); rebindTasks(); metrics(); render();
          };
        });
      }
      rebindTasks();
      document.getElementById('dr-addtask').onclick=function(){
        var inp=document.getElementById('dr-newtask'); var v=inp.value.trim(); if(!v)return;
        var list=getTasks(p); list.push({id:WB.uid(),text:v,done:false}); saveTasks(p,list);
        document.getElementById('dr-tasks').innerHTML=list.map(taskRow).join(''); inp.value=''; rebindTasks(); WB.toast('Task added','ok'); metrics(); render();
      };
      document.getElementById('dr-toggle').onclick=function(){ var ns=p.status==='active'?'paused':'active'; store.update(p.id,{status:ns,lastActivity:new Date().toISOString()}); p.status=ns; WB.toast('Project '+ns,'ok'); WB.drawer.close(); metrics();tabs();render(); };
      document.getElementById('dr-archive').onclick=function(e){
        if(p.status==='archived'){ WB.arm(e.currentTarget,'Delete forever?',function(){ store.remove(p.id); WB.toast('Project deleted','ok'); WB.drawer.close(); metrics();tabs();render(); }); }
        else { store.update(p.id,{status:'archived'}); WB.toast('Project archived','info'); WB.drawer.close(); metrics();tabs();render(); }
      };
    }

    function openNew(){
      WB.drawer.open({ title:'New project', body:
        '<div class="wb-field"><label>Project name</label><input id="np-name" placeholder="e.g. Spring Campaign"></div>'+
        '<div class="wb-field"><label>Description</label><textarea id="np-desc" placeholder="What is this workspace for?"></textarea></div>'+
        '<div class="wb-field"><label>Subdomain</label><input id="np-slug" placeholder="auto from name"><div style="font-size:11px;color:var(--hx-text-dim);font-family:var(--hx-mono);margin-top:5px" id="np-prev">your-project.helvex.app</div></div>',
        foot:'<button class="wb-btn primary" id="np-save" style="flex:1">Create project</button><button class="wb-btn" id="np-cancel">Cancel</button>',
        onMount:function(){
          var name=document.getElementById('np-name'), slug=document.getElementById('np-slug'), prev=document.getElementById('np-prev'), touched=false;
          function sl(s){return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40);}
          name.oninput=function(){ if(!touched)slug.value=sl(name.value); prev.textContent=(slug.value||'your-project')+'.helvex.app'; };
          slug.oninput=function(){ touched=true; slug.value=sl(slug.value); prev.textContent=(slug.value||'your-project')+'.helvex.app'; };
          document.getElementById('np-cancel').onclick=WB.drawer.close;
          document.getElementById('np-save').onclick=function(){
            var n=name.value.trim(); if(!n){WB.toast('Name is required','err');return;}
            store.add({ id:WB.uid(), name:n, slug:sl(slug.value||n), desc:document.getElementById('np-desc').value.trim()||'New workspace — start a chat to populate it.', status:'active', agents:0, files:0, tasks:{done:0,total:0}, members:['AM'], lastActivity:new Date().toISOString(), createdAt:new Date().toISOString(), deploy:'idle' });
            WB.toast('Project created','ok'); WB.drawer.close(); metrics();tabs();render();
          };
        } });
    }

    $('pj-new').onclick=openNew;
    var qt; $('pj-q').oninput=function(e){ST.q=e.target.value.trim();clearTimeout(qt);qt=setTimeout(render,140);};
    $('pj-sort').onchange=function(e){ST.sort=e.target.value;render();};
    metrics(); tabs(); render();
    try{ if(new URLSearchParams(location.search).get('new')==='1') openNew(); }catch(e){}
  })();
  </script>
</body>
</html>
