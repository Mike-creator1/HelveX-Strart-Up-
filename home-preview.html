<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>Helix Home — mobile preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* NEW STRUCTURE — minimal, vertically-centred, input-first (Claude/ChatGPT-like).
     Black + white/grey, red only on send, one tiny gold brand dot. */
  *{box-sizing:border-box;margin:0;}
  body{display:flex;justify-content:center;background:#1a1a1c;font-family:'Inter',system-ui,sans-serif;}
  #home{width:390px;min-height:844px;display:flex;flex-direction:column;color:#F4F4F5;
    background:radial-gradient(120% 42% at 50% 30%, rgba(255,255,255,.045), transparent 60%), #060607;}
  .bar{display:flex;align-items:center;gap:12px;padding:20px 18px 8px;}
  .menu{display:grid;place-items:center;width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#F4F4F5;}
  .menu svg{width:19px;height:19px;}
  .brand{display:flex;align-items:center;gap:8px;}
  .brand::before{content:"";width:6px;height:6px;border-radius:50%;background:#C8A24A;box-shadow:0 0 8px rgba(200,162,74,.45);}
  .brand-name{font-size:18px;font-weight:700;letter-spacing:-.02em;}
  .pro{font-size:10px;font-weight:600;color:#9A9AA0;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);border-radius:5px;letter-spacing:.14em;padding:3px 8px;}
  /* centred core */
  .core{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:18px 22px 60px;}
  .glyph{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;margin:0 auto 22px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);}
  .glyph svg{width:26px;height:26px;color:#F4F4F5;}
  .greet{font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1.12;}
  .greet .dot{color:#6E6E76;}
  .sub{color:#8A8A92;font-size:14.5px;margin:10px auto 0;max-width:300px;}
  .composer{width:100%;max-width:560px;margin:26px auto 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:20px;box-shadow:0 24px 60px -34px rgba(0,0,0,.9);padding:14px;backdrop-filter:blur(16px);text-align:left;}
  .inrow{display:flex;align-items:center;gap:10px;}
  .input{flex:1;border:0;background:none;outline:none;color:#F4F4F5;font:inherit;font-size:16px;}
  .input::placeholder{color:#5A5A62;}
  .mic{width:38px;height:38px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#AEAEB6;border-radius:12px;display:grid;place-items:center;}
  .mic svg{width:18px;height:18px;}
  .send{width:40px;height:40px;background:#E5484D;border:0;border-radius:12px;color:#fff;display:grid;place-items:center;box-shadow:0 10px 26px -12px rgba(229,72,77,.6);}
  .send svg{width:19px;height:19px;}
  .pills{display:flex;gap:8px;margin-top:14px;justify-content:center;}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#B0B0B6;font-size:13px;font-weight:500;}
  .pill svg{width:16px;height:16px;}
  .pill.on{color:#F4F4F5;border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06);}
  button{cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="home">
  <div class="bar">
    <button class="menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
    <div class="brand"><span class="brand-name">Helix</span><span class="pro">PRO</span></div>
  </div>
  <div class="core">
    <h1 class="greet">Good evening<span class="dot">.</span></h1>
    <p class="sub">What would you like to achieve today?</p>
    <div class="composer">
      <div class="inrow">
        <input class="input" placeholder="Ask Helix anything…">
        <button class="mic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg></button>
        <button class="send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V5"/><path d="m6 11 6-6 6 6"/></svg></button>
      </div>
      <div class="pills">
        <button class="pill on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18"/></svg>Web</button>
        <button class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><polyline points="14 3 14 8 19 8"/></svg>Sources</button>
        <button class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>Focus</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
